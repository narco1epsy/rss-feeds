name: Update RSS

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - run: npm ci

      - name: Run all scrapers
        run: |
          node scrapers/jokei.js
          node scrapers/ideot.js
          node scrapers/couperin.js
          node scrapers/still-life.js
          node scrapers/elephant.js
          node scrapers/ampm.js
          node scrapers/iens.js
          # node scrapers/newshop.js  ← 追加するだけ

      - name: Commit and push docs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/*.xml
          git diff --staged --quiet || git commit -m "Update RSS feeds: $(date +'%Y-%m-%d %H:%M')"
          git push