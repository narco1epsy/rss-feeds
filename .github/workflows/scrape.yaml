name: Update RSS

on:
  schedule:
    - cron: '15 * * * *'
  push:
    branches:
      - main
    paths:
      - 'scrapers/*.js'
      - '.github/workflows/scrape.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - run: npm ci

      - name: Run all scrapers
        run: |
          node scrapers/jokei.js
          node scrapers/ideot.js
          node scrapers/couperin.js
          node scrapers/still-life.js
          node scrapers/elephant.js
          node scrapers/ampm.js
          node scrapers/iens.js
          node scrapers/graphio-buro.js
          # node scrapers/newshop.js  ← 追加するだけ

      - name: Deploy XML to gh-pages
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 生成した XML を一時保存
          cp -r docs /tmp/rss-output
          
          # gh-pages をフェッチして切り替え（なければ orphan で作成）
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          
          # gh-pages の中身を最新 XML で上書き
          rm -rf docs
          cp -r /tmp/rss-output docs
          
          git add docs/*.xml
          git diff --staged --quiet || git commit -m "Update RSS feeds: $(date +'%Y-%m-%d %H:%M')"
          git push origin gh-pages