name: Update RSS

on:
  schedule:
    - cron: '15 * * * *'
  push:
    branches:
      - main
    paths:
      - 'scrapers/*.js'
      - '.github/workflows/scrape.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - run: npm ci

      - name: Run all scrapers
        run: |
          node scrapers/ampm.js
          node scrapers/couperin.js
          node scrapers/elephant.js
          node scrapers/graphio-buro.js
          node scrapers/ideot.js
          node scrapers/iens.js
          node scrapers/jokei.js
          node scrapers/kauniitasiat.js
          node scrapers/kosvintage.js
          node scrapers/mobelman.js
          node scrapers/noage.js
          node scrapers/rafuju.js
          node scrapers/shabbys.js
          node scrapers/still-life.js
          node scrapers/stoop.js
          node scrapers/talo.js

      - name: Publish to gh-pages root
        run: |
          set -e

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          mkdir -p /tmp/rss
          cp docs/*.xml /tmp/rss/
          touch /tmp/rss/.nojekyll

          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          cp /tmp/rss/*.xml ./
          cp /tmp/rss/.nojekyll ./

          git add -A .

          if ! git diff --cached --quiet; then
            git commit -m "Update RSS feeds: $(date +'%Y-%m-%d %H:%M')"
            git push origin gh-pages
          fi