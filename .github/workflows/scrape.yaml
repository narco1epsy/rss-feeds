name: Update RSS

on:
  schedule:
    - cron: '15 * * * *'
  push:
    branches:
      - main
    paths:
      - 'scrapers/*.js'
      - '.github/workflows/scrape.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - run: npm ci

      - name: Run all scrapers
        run: |
          node scrapers/jokei.js
          node scrapers/ideot.js
          node scrapers/couperin.js
          node scrapers/still-life.js
          node scrapers/elephant.js
          node scrapers/ampm.js
          node scrapers/iens.js
          node scrapers/graphio-buro.js
          # node scrapers/newshop.js

      - name: Save generated XML
        run: |
          mkdir -p /tmp/rss
          cp docs/*.xml /tmp/rss/
          touch /tmp/rss/.nojekyll

      - name: Publish to gh-pages root
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          mkdir -p /tmp/rss
          cp docs/*.xml /tmp/rss/
          touch /tmp/rss/.nojekyll

          git fetch origin gh-pages

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            -exec rm -rf {} +

          cp /tmp/rss/*.xml ./
          cp /tmp/rss/.nojekyll ./

          git add *.xml .nojekyll
          git diff --staged --quiet || git commit -m "Update RSS feeds: $(date +'%Y-%m-%d %H:%M')"
          git push origin gh-pages